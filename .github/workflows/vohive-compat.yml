name: VoHive Compatibility

on:
  workflow_dispatch:
    inputs:
      vohive-repository:
        description: VoHive repository to test against, such as owner/repo.
        required: true
      vohive-ref:
        description: Optional branch, tag, or SHA for the VoHive checkout.
        required: false
        default: ""

permissions:
  contents: read

jobs:
  compat:
    name: Old VoHive consumer
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout vowifi-go
        uses: actions/checkout@v4
        with:
          path: vowifi-go

      - name: Set up pinned Go
        uses: actions/setup-go@v5
        with:
          go-version-file: vowifi-go/go.mod
          cache: true
          cache-dependency-path: vowifi-go/go.sum

      - name: Checkout VoHive default ref
        if: ${{ inputs.vohive-ref == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.vohive-repository }}
          path: vohive

      - name: Checkout VoHive selected ref
        if: ${{ inputs.vohive-ref != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.vohive-repository }}
          ref: ${{ inputs.vohive-ref }}
          path: vohive

      - name: Run compatibility checks
        env:
          VOHIVE_DIR: ${{ github.workspace }}/vohive
          GO_BIN: go
        run: |
          cd vowifi-go
          make compat-vohive
